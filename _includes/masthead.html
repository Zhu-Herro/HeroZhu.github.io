<div class="masthead">
  <div class="masthead__inner-wrap">
    <div class="masthead__menu">
      <nav id="site-nav" class="greedy-nav" style="display:flex !important;align-items:center !important;">
        <button><div class="navicon"></div></button>
        <ul class="visible-links">
          <li class="masthead__menu-item masthead__menu-item--lg masthead__menu-home-item"><a href="#about-me">Homepage</a></li>
          {% for link in site.data.navigation.main %}
            <li class="masthead__menu-item"><a href="{{ link.url }}">{{ link.title }}</a></li>
          {% endfor %}
        </ul>
        <ul class="hidden-links hidden"></ul>
        <div class="nav-controls" style="margin-left:auto !important;display:flex !important;align-items:center !important;gap:8px !important;padding-right:50px !important;flex-shrink:0 !important;z-index:999 !important;position:relative !important;">
          <button class="nav-ctrl-btn active" id="langZh" onclick="switchLang('zh')"
            style="position:static !important;height:auto !important;right:auto !important;font-size:0.78rem !important;font-weight:700 !important;padding:6px 14px !important;border:2px solid #3d6eb0 !important;border-radius:6px !important;background:#3d6eb0 !important;color:#fff !important;cursor:pointer !important;white-space:nowrap !important;line-height:1.5 !important;min-width:auto !important;box-shadow:none !important;margin:0 !important;width:auto !important;">中</button>
          <button class="nav-ctrl-btn" id="langEn" onclick="switchLang('en')"
            style="position:static !important;height:auto !important;right:auto !important;font-size:0.78rem !important;font-weight:600 !important;padding:6px 14px !important;border:2px solid #d0d0d0 !important;border-radius:6px !important;background:#f8f9fa !important;color:#555 !important;cursor:pointer !important;white-space:nowrap !important;line-height:1.5 !important;min-width:auto !important;box-shadow:none !important;margin:0 !important;width:auto !important;">EN</button>
          <button class="nav-ctrl-btn" id="themeToggle" onclick="toggleTheme()" title="切换白天/黑夜模式"
            style="position:static !important;height:auto !important;right:auto !important;font-size:0.78rem !important;font-weight:600 !important;padding:6px 12px !important;border:2px solid #d0d0d0 !important;border-radius:6px !important;background:#f8f9fa !important;color:#555 !important;cursor:pointer !important;white-space:nowrap !important;line-height:1.5 !important;min-width:auto !important;box-shadow:none !important;margin:0 !important;width:auto !important;">🌙</button>
        </div>
      </nav>
    </div>
  </div>
</div>
