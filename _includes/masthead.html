<div class="masthead">
  <div class="masthead__inner-wrap" style="display:flex !important;align-items:center !important;justify-content:space-between !important;">
    <div class="masthead__menu" style="flex:1 !important;min-width:0 !important;">
      <nav id="site-nav" class="greedy-nav">
        <button><div class="navicon"></div></button>
        <ul class="visible-links">
          <li class="masthead__menu-item masthead__menu-item--lg masthead__menu-home-item"><a href="#about-me">Homepage</a></li>
          {% for link in site.data.navigation.main %}
            <li class="masthead__menu-item"><a href="{{ link.url }}">{{ link.title }}</a></li>
          {% endfor %}
        </ul>
        <ul class="hidden-links hidden"></ul>
      </nav>
    </div>
    <div class="nav-controls" style="display:flex !important;align-items:center !important;gap:8px !important;flex-shrink:0 !important;padding-left:16px !important;">
      <button id="langZh" onclick="switchLang('zh')"
        style="border:2px solid #3d6eb0;border-radius:6px;background:#3d6eb0;color:#fff;font-size:0.78rem;font-weight:700;padding:6px 14px;cursor:pointer;white-space:nowrap;line-height:1.5;">中</button>
      <button id="langEn" onclick="switchLang('en')"
        style="border:2px solid #ccc;border-radius:6px;background:#f8f9fa;color:#666;font-size:0.78rem;font-weight:600;padding:6px 14px;cursor:pointer;white-space:nowrap;line-height:1.5;">EN</button>
      <button id="themeToggle" onclick="toggleTheme()" title="Toggle dark/light mode"
        style="border:2px solid #ccc;border-radius:6px;background:#f8f9fa;font-size:0.78rem;padding:6px 12px;cursor:pointer;white-space:nowrap;line-height:1.5;">🌙</button>
    </div>
  </div>
</div>
