<div class="masthead">
  <div class="masthead__inner-wrap">
    <div class="masthead__menu">
      <nav id="site-nav" class="greedy-nav">
        <button><div class="navicon"></div></button>
        <ul class="visible-links">
          <li class="masthead__menu-item masthead__menu-item--lg masthead__menu-home-item"><a href="#about-me">Homepage</a></li>
          {% for link in site.data.navigation.main %}
            <li class="masthead__menu-item"><a href="{{ link.url }}">{{ link.title }}</a></li>
          {% endfor %}
        </ul>
        <ul class="hidden-links hidden"></ul>
        <div class="nav-controls">
          <button class="nav-ctrl-btn nav-ctrl-lang active" id="langZh" onclick="switchLang('zh')">中</button>
          <button class="nav-ctrl-btn nav-ctrl-lang" id="langEn" onclick="switchLang('en')">EN</button>
          <button class="nav-ctrl-btn nav-ctrl-theme" id="themeToggle" onclick="toggleTheme()" title="Toggle dark/light mode">🌙</button>
        </div>
      </nav>
    </div>
  </div>
</div>
