---
layout: compress
---

<!doctype html>
<html lang="zh-CN" class="no-js">
  <head>
    {% include head.html %}
    {% include head/custom.html %}
    <style>
      /* ======== Language switch ======== */
      .lang-zh, .lang-en { display: none; }
      html[lang="zh-CN"] .lang-zh,
      html[lang="zh-CN"] .lang-zh-inline { display: block; }
      html[lang="en"] .lang-en,
      html[lang="en"] .lang-en-inline { display: block; }
      html[lang="zh-CN"] .lang-zh-inline { display: inline; }
      html[lang="en"] .lang-en-inline { display: inline; }

      /* ======== Dark Mode Variables ======== */
      :root {
        --bg: #fff;
        --bg-alt: #fafafa;
        --text: #3d3d3d;
        --text-muted: #777;
        --border: #e8ecf1;
        --card-bg: #fff;
        --link: #3d6eb0;
      }
      .dark-mode {
        --bg: #1a1a2e;
        --bg-alt: #16213e;
        --text: #e0e0e0;
        --text-muted: #a0a0b0;
        --border: #2a2a4a;
        --card-bg: #222244;
        --link: #7eb8ff;
      }

      /* ======== Dark mode overrides ======== */
      .dark-mode body { background-color: var(--bg); color: var(--text); }
      .dark-mode h1, .dark-mode h2, .dark-mode h3, .dark-mode h4, .dark-mode h5, .dark-mode h6 { color: var(--text); }
      .dark-mode a { color: var(--link); }
      .dark-mode .masthead { background-color: var(--bg); border-bottom-color: var(--border); }
      .dark-mode .greedy-nav { background-color: var(--bg); }
      .dark-mode .masthead__menu-item a { color: var(--text-muted); }
      .dark-mode .masthead__menu-item a:hover { color: var(--text); }
      .dark-mode .sidebar { background: var(--bg); }
      .dark-mode .profile_box { background: transparent; }
      .dark-mode .author__urls a { color: var(--text-muted); }
      .dark-mode .author__urls a:hover { color: var(--text); }
      .dark-mode .author__urls { background: var(--card-bg); border-color: var(--border); }
      .dark-mode .author__urls:after { border-color: var(--card-bg) transparent; }
      .dark-mode .author__urls li { color: var(--text-muted); }
      .dark-mode .page__content h1 { border-bottom-color: var(--border); }
      .dark-mode .author__avatar img { border-color: var(--border); }
      .dark-mode .social-icons .fa, .dark-mode .social-icons .fas, .dark-mode .social-icons .fab, .dark-mode .social-icons .ai { color: var(--text-muted) !important; }
      .dark-mode #main { color: var(--text); }
      .dark-mode code { background: #2a2a44; }
      .dark-mode .greedy-nav .hidden-links { background: var(--card-bg); border-color: var(--border); }
      .dark-mode .greedy-nav .hidden-links a:hover { background: #333; }
      .dark-mode .greedy-nav .hidden-links:after { border-color: var(--card-bg) transparent; }

      /* ======== Nav controls (lang + theme buttons) ======== */
      .greedy-nav {
        display: flex !important;
        align-items: center !important;
      }
      .nav-controls {
        margin-left: auto !important;
        display: flex !important;
        align-items: center !important;
        gap: 6px !important;
        padding-right: 3rem !important;
        flex-shrink: 0 !important;
        z-index: 5 !important;
        position: relative !important;
      }
      .nav-ctrl-btn {
        position: static !important;
        height: auto !important;
        right: auto !important;
        font-size: 0.75rem !important;
        font-weight: 600 !important;
        padding: 5px 12px !important;
        border: 1.5px solid #d0d0d0 !important;
        border-radius: 6px !important;
        background: #f8f9fa !important;
        color: #555 !important;
        cursor: pointer !important;
        white-space: nowrap !important;
        line-height: 1.4 !important;
        transition: all 0.2s !important;
        outline: none !important;
        min-width: auto !important;
        box-shadow: none !important;
      }
      .nav-ctrl-btn:hover {
        border-color: #3d6eb0 !important;
        color: #3d6eb0 !important;
        background: #eef3fb !important;
      }
      .nav-ctrl-btn.active {
        background: #3d6eb0 !important;
        color: #fff !important;
        border-color: #3d6eb0 !important;
        font-weight: 700 !important;
      }
      .dark-mode .nav-ctrl-btn {
        background: #2a2a3a !important;
        border-color: #555 !important;
        color: #bbb !important;
      }
      .dark-mode .nav-ctrl-btn:hover {
        border-color: #7eb8ff !important;
        color: #7eb8ff !important;
        background: #2a3040 !important;
      }
      .dark-mode .nav-ctrl-btn.active {
        background: #5a9fd4 !important;
        color: #fff !important;
        border-color: #5a9fd4 !important;
      }

      /* ======== Typography ======== */
      .page__content { font-size: 1.05rem; line-height: 1.8; }
      .page__content h1 { font-size: 1.6rem; margin-top: 2em; padding-bottom: 0.4em; border-bottom: 2px solid var(--border); display: flex; align-items: center; gap: 8px; }
      .page__content h2 { font-size: 1.35rem; }
      .page__content p, .page__content li { margin-bottom: 0.7em; }
      .page__content ul { padding-inline-start: 1.5em; }

      /* ======== Education Cards ======== */
      .edu-card {
        background: #f5f7fa;
        border: 1px solid #e8ecf1;
        border-radius: 10px;
        padding: 18px 20px;
        margin-bottom: 14px;
        display: flex;
        align-items: flex-start;
        gap: 16px;
        transition: box-shadow 0.2s;
      }
      .edu-card:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
      .dark-mode .edu-card {
        background: #222244;
        border-color: #2a2a4a;
      }
      .edu-card-logo {
        flex-shrink: 0;
        width: 52px;
        height: 52px;
        border-radius: 8px;
        object-fit: contain;
        background: #fff;
        padding: 4px;
        border: 1px solid #e8ecf1;
      }
      .dark-mode .edu-card-logo {
        background: #333;
        border-color: #444;
      }
      .edu-card-body { flex: 1; min-width: 0; }
      .edu-card-date { font-size: 0.82rem; font-weight: 600; color: #3d6eb0; margin-bottom: 3px; }
      .dark-mode .edu-card-date { color: #7eb8ff; }
      .edu-card-degree { font-size: 1rem; font-weight: 700; margin-bottom: 3px; }
      .edu-card-school { font-size: 0.88rem; color: #666; margin-bottom: 2px; }
      .dark-mode .edu-card-school { color: #999; }
      .edu-card-detail { font-size: 0.82rem; color: #888; }
      .dark-mode .edu-card-detail { color: #888; }

      /* ======== Avatar ======== */
      .author__avatar img {
        border-radius: 50% !important;
        object-fit: cover;
        object-position: center;
        width: 175px; height: 175px;
        max-width: 175px !important;
      }
      @media (max-width: 925px) {
        .author__avatar img { width: 75px; height: 75px; }
        .nav-ctrl-btn { font-size: 0.7rem !important; padding: 4px 8px !important; }
      }

      /* ======== Misc ======== */
      .author__urls li div[style] { font-size: 0.8rem !important; line-height: 1.5 !important; margin-bottom: 0.5em !important; }
      .author__bio { font-size: 0.88rem !important; }
      .author__urls li { font-size: 0.85rem; }
      #main { margin-top: 1.5em; }
      .page__content h1:first-child { margin-top: 0.5em; }
    </style>
  </head>

  <body>

    {% include browser-upgrade.html %}
    {% include masthead.html %}

    <div id="main" role="main">
      {% include sidebar.html %}
    
      <article class="page" itemscope itemtype="http://schema.org/CreativeWork">
        {% if page.title %}<meta itemprop="headline" content="{{ page.title | markdownify | strip_html | strip_newlines | escape_once }}">{% endif %}
        <div class="page__inner-wrap">
          <section class="page__content" itemprop="text">
            {{ content }}
          </section>
        </div>
      </article>
    </div>

    {% include scripts.html %}

    <script>
    (function() {
      var html = document.documentElement;

      var ACTIVE_STYLE = 'position:static !important;height:auto !important;right:auto !important;font-size:0.78rem !important;font-weight:700 !important;padding:6px 14px !important;border:2px solid #3d6eb0 !important;border-radius:6px !important;background:#3d6eb0 !important;color:#fff !important;cursor:pointer !important;white-space:nowrap !important;line-height:1.5 !important;min-width:auto !important;box-shadow:none !important;margin:0 !important;width:auto !important;';
      var INACTIVE_STYLE = 'position:static !important;height:auto !important;right:auto !important;font-size:0.78rem !important;font-weight:600 !important;padding:6px 14px !important;border:2px solid #d0d0d0 !important;border-radius:6px !important;background:#f8f9fa !important;color:#555 !important;cursor:pointer !important;white-space:nowrap !important;line-height:1.5 !important;min-width:auto !important;box-shadow:none !important;margin:0 !important;width:auto !important;';

      /* ====== Language Switcher ====== */
      window.switchLang = function(lang) {
        html.lang = lang === 'zh' ? 'zh-CN' : 'en';
        var zhBtn = document.getElementById('langZh');
        var enBtn = document.getElementById('langEn');
        if (zhBtn) {
          zhBtn.setAttribute('style', lang === 'zh' ? ACTIVE_STYLE : INACTIVE_STYLE);
          zhBtn.classList.toggle('active', lang === 'zh');
        }
        if (enBtn) {
          enBtn.setAttribute('style', lang === 'en' ? ACTIVE_STYLE : INACTIVE_STYLE);
          enBtn.classList.toggle('active', lang === 'en');
        }
        try { localStorage.setItem('lang', lang); } catch(e) {}
      };
      var savedLang = 'zh';
      try { savedLang = localStorage.getItem('lang') || 'zh'; } catch(e) {}
      switchLang(savedLang);

      /* ====== Dark Mode Toggle ====== */
      window.toggleTheme = function() {
        html.classList.toggle('dark-mode');
        var isDark = html.classList.contains('dark-mode');
        var btn = document.getElementById('themeToggle');
        if (btn) btn.textContent = isDark ? '☀️' : '🌙';
        try { localStorage.setItem('theme', isDark ? 'dark' : 'light'); } catch(e) {}
      };
      var savedTheme = 'light';
      try { savedTheme = localStorage.getItem('theme') || 'light'; } catch(e) {}
      var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      if (savedTheme === 'dark' || (savedTheme === 'light' ? false : prefersDark)) {
        html.classList.add('dark-mode');
        var btn = document.getElementById('themeToggle');
        if (btn) btn.textContent = '☀️';
      }

      /* ====== Smooth scroll nav ====== */
      document.querySelectorAll('.visible-links a[href^="#"]').forEach(function(a) {
        a.addEventListener('click', function(e) {
          var target = document.querySelector(this.getAttribute('href'));
          if (target) {
            e.preventDefault();
            target.scrollIntoView({ behavior: 'smooth', block: 'start' });
          }
        });
      });
    })();
    </script>

  </body>
</html>
